    try{
      const res = await fetch(`${FIREBASE_URL}/${key}.json`);

    try{

        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(value)

    }catch(e){ console.error('SET error:',e); }
  },

async function loadAll(){
  // الخطوة 1: حمّل من الكاش المحلي فوراً (يعمل دائماً حتى أوفلاين)
  const cu = LC.get('em_cur') || (() => { try{ const r=localStorage.getItem('em_cur'); return r?JSON.parse(r):null; }catch(e){return null;} })();
  const localUsers    = LC.get('em_users')  || [];
  const localAccs     = LC.get('em_accs')   || [];
  const localTxs      = LC.get('em_txs')    || [];
  const localCats     = LC.get('em_cats')   || DEFCATS;
  const localNotifs   = LC.get('em_notifs') || [];
  const localMsgs     = LC.get('em_msgs')   || [];
  const localSets     = (() => { try{ const r=localStorage.getItem('em_sets'); return r?JSON.parse(r):null; }catch(e){return null;} })();

  // طبّق البيانات المحلية فوراً
  st.users   = localUsers;
  st.accounts= localAccs;
  st.txs     = localTxs;
  const rawCats = localCats.length ? localCats : DEFCATS;
  // أضف emoji للتصنيفات القديمة التي ليس عندها
  st.cats = rawCats.map(c=>c.emoji?c:{...c,emoji:_guessEmoji(c.ar,c.en)});
  st.notifs  = localNotifs;
  st.msgs    = localMsgs;
  if(localSets){ st.lang=localSets.lang||'ar'; st.dark=localSets.dark||false; st.dec=localSets.dec??2; st.currency=localSets.currency||'USD'; st.savingsTarget=localSets.savingsTarget??20; }
  // budgets & goals
  const localBudgets = LC.get('em_budgets') || {};
  const localGoals   = LC.get('em_goals')   || [];
  st.budgets = localBudgets;
  st.goals   = localGoals;
  if(cu){ st.cur=cu; st.selUserId=cu.id; st.page='home';
    // Load per-user settings if sub (stored under em_sets_<uid>)
    if(cu.userType==='sub'){
      const subSetsKey='em_sets_'+cu.id;
      const subSets=(() => { try{ const r=localStorage.getItem(subSetsKey); return r?JSON.parse(r):null; }catch(e){return null;} })();
      if(subSets){ st.lang=subSets.lang||st.lang; st.dark=subSets.dark??st.dark; st.dec=subSets.dec??st.dec; st.currency=subSets.currency||st.currency; }
    }
  }

  // أظهر التطبيق فوراً من الكاش
  document.getElementById('loading').style.display='none';
  applyDir();
  render();

  // الخطوة 2: مزامنة خلفية مع Firebase (لا تؤثر على التحميل الأولي)
  if(navigator.onLine){
    setTimeout(async()=>{
      try{
        const fbFetch = key => fetch(`${FIREBASE_URL}/${key}.json`,{signal:AbortSignal.timeout(10000)}).then(r=>r.ok?r.json():null).catch(()=>null);
        const [u,a,tx,cats,notifs,msgs,sets,budgets,goals] = await Promise.all([
          fbFetch('em_users'), fbFetch('em_accs'), fbFetch('em_txs'),
          fbFetch('em_cats'),  fbFetch('em_notifs'), fbFetch('em_msgs'), fbFetch('em_sets'),
          fbFetch('em_budgets'), fbFetch('em_goals')
        ]);
        // حفظ في الكاش المحلي
        if(u)    LC.set('em_users',  u);
        if(a)    LC.set('em_accs',   a);
        if(tx)   LC.set('em_txs',    tx);
        if(cats) LC.set('em_cats',   cats);
        if(notifs) LC.set('em_notifs', notifs);
        if(msgs) LC.set('em_msgs',   msgs);
        if(sets) localStorage.setItem('em_sets', JSON.stringify(sets));
        if(budgets) LC.set('em_budgets', budgets);
        if(goals)   LC.set('em_goals', goals);
        // تحديث الحالة إذا تغيرت البيانات
        let changed = false;
        if(u && JSON.stringify(u)!==JSON.stringify(st.users)){ st.users=u; changed=true; }
        if(a && JSON.stringify(a)!==JSON.stringify(st.accounts)){ st.accounts=a; changed=true; }
        if(tx && JSON.stringify(tx)!==JSON.stringify(st.txs)){ st.txs=tx; changed=true; }
        if(cats && cats.length) st.cats=cats;
        if(notifs && JSON.stringify(notifs)!==JSON.stringify(st.notifs)){ st.notifs=notifs; changed=true; }
        if(msgs && JSON.stringify(msgs)!==JSON.stringify(st.msgs)){ st.msgs=msgs; changed=true; }
        if(sets){ st.lang=sets.lang||'ar'; st.dark=sets.dark||false; st.dec=sets.dec??2; st.currency=sets.currency||'USD'; }
        if(budgets) st.budgets=budgets;
        if(goals) st.goals=goals;
        if(st.cur && u){
          const fresh = u.find(x=>x.id===st.cur.id);
          if(fresh){ st.cur=fresh; localStorage.setItem('em_cur',JSON.stringify(fresh)); LC.set('em_cur',fresh); }
        }
        if(changed){ applyDir(); render(); }
        await syncPending();
        checkBudgetAlerts();
      }catch(e){ console.warn('Background sync failed:', e); }
    }, 500); // تأخير 500ms حتى يظهر التطبيق أولاً
  }

  setupNetworkListeners();
  startAutoSync();
}

function applyDir(){
  document.body.className=st.dark?'dark':'';
  // Neon particle system for dark mode
  const dp=document.getElementById('darkParticles');
  if(dp){
    if(st.dark){
      dp.style.display='block';
      if(!dp._initialized){
        dp._initialized=true;
        const colors=['rgba(99,102,241,.5)','rgba(139,92,246,.4)','rgba(6,182,212,.45)','rgba(167,139,250,.35)'];
        for(let i=0;i<18;i++){
          const s=document.createElement('div');
          const sz=Math.random()*3+1;
          const x=Math.random()*100,y=Math.random()*100;
          const dur=Math.random()*12+8;
          const delay=Math.random()*-15;
          const color=colors[Math.floor(Math.random()*colors.length)];
          s.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;background:${color};left:${x}%;top:${y}%;box-shadow:0 0 ${sz*4}px ${color};animation:neonFloat ${dur}s ${delay}s linear infinite`;
          dp.appendChild(s);
        }
        const style=document.createElement('style');
        style.textContent='@keyframes neonFloat{0%{transform:translateY(0) scale(1);opacity:.6}25%{transform:translateY(-30px) scale(1.3);opacity:1}50%{transform:translateY(-60px) scale(0.8);opacity:.4}75%{transform:translateY(-30px) scale(1.1);opacity:.8}100%{transform:translateY(0) scale(1);opacity:.6}}';
        document.head.appendChild(style);
      }
    } else {
      dp.style.display='none';
    }
  }
  if(st.lang==='en')document.body.classList.add('ltr');
  else document.body.classList.remove('ltr');
}

const t=()=>T[st.lang];
const fmt=(n)=>fmtC(n);
const isAdmin=()=>st.cur?.userType==='admin';
const isRTL=()=>st.lang==='ar';
const subUsers=()=>st.users.filter(u=>u.adminId===st.cur?.id);
const userAccs=(uid)=>st.accounts.filter(a=>a.userId===(uid||st.cur?.id));
const visAccs=(uid)=>userAccs(uid).filter(a=>!a.hidden);
const totBal=(uid)=>visAccs(uid).reduce((s,a)=>s+(a.balance||0),0);
const userTx=(uid,visOnly=true)=>{
  const uid2=uid||st.cur?.id;
  const txs=st.txs.filter(tx=>tx.userId===uid2);
  if(!visOnly)return txs;
  const vis=new Set(visAccs(uid2).map(a=>a.id));
  return txs.filter(tx=>vis.has(tx.accountId));
};
const getCat=(id)=>{const c=st.cats.find(x=>x.id===id);return c?(st.lang==='ar'?c.ar:c.en):''};
const getAcc=(id)=>st.accounts.find(a=>a.id===id);
const adminNotifs=()=>{
  if(!st.cur)return[];
  const sids=new Set(subUsers().map(u=>u.id));
  return st.notifs.filter(n=>sids.has(n.userId)||n.adminId===st.cur.id);
};
const unreadCount=()=>adminNotifs().filter(n=>!n.read).length;

async function saveSets(){
  const s={lang:st.lang,dark:st.dark,dec:st.dec,currency:st.currency,savingsTarget:st.savingsTarget??20};
  // Sub users get their own settings key so they don't overwrite admin settings
  if(st.cur?.userType==='sub'){
    const key='em_sets_'+st.cur.id;
    localStorage.setItem(key,JSON.stringify(s));
  } else {
    localStorage.setItem('em_sets',JSON.stringify(s));
    await S.set('em_sets',s);
  }
}
async function saveMsgs(){LC.set('em_msgs',st.msgs);await S.set('em_msgs',st.msgs);}

async function saveGoals(){LC.set('em_goals',st.goals);await S.set('em_goals',st.goals);}

async function addNotif(msg,userId){
  const n={id:gid(),msg,userId:userId||st.cur?.id,adminId:st.cur?.id,time:new Date().toISOString(),read:false};
  st.notifs=[n,...st.notifs];
  await saveNotifs();
}

function toast(msg,type='success'){
  const w=document.getElementById('toasts');
  if(!w)return;
  const el=document.createElement('div');
  el.className='toast';
  el.style.background=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#22c55e';
  el.textContent=msg;
  w.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function render(){
  const app=document.getElementById('app');
  applyDir();
  const toastEl=`<div class="toast-wrap" id="toasts"></div>`;
  if(!st.cur){
    app.innerHTML=toastEl+renderAuth();
    bindAuth();return;
  }
  app.innerHTML=toastEl+renderMain();
  bindMain();
}

      <button onclick="navTo('prof')" class="iBtn">${svg('user',18)}</button>

        <button onclick="navTo('${item.id}');closeMenu()" style="width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;border:none;cursor:pointer;margin-bottom:2px;text-align:${isRTL()?'right':'left'};background:${st.page===item.id?'var(--accentL)':'transparent'};color:${st.page===item.id?'var(--accent)':'var(--text2)'};font-weight:${st.page===item.id?600:400};font-family:var(--font);font-size:13px">
          ${svg(item.icon,16)}<span style="flex:1">${item.l}</span>

          <select onchange="setLang(this.value)" style="width:auto;font-size:11px;padding:3px 6px;border-radius:6px">
            <option value="ar" ${st.lang==='ar'?'selected':''}>العربية</option>
            <option value="en" ${st.lang==='en'?'selected':''}>English</option>

        <!-- الخانة العشرية -->
        <div style="display:flex;align-items:center;justify-content:space-between">

          <select onchange="setDec(this.value)" style="width:auto;font-size:11px;padding:3px 6px;border-radius:6px">

          </select>
        </div>
        <!-- العملة -->
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:11px;color:var(--text2)">💱 ${isRTL()?'العملة':'Currency'}</span>
          <select onchange="setCurrency(this.value)" style="width:auto;font-size:11px;padding:3px 6px;border-radius:6px">
            ${Object.entries(CURRENCIES).map(([code,c])=>`<option value="${code}" ${(st.currency||'USD')===code?'selected':''}>${c.flag} ${code}</option>`).join('')}
          </select>
        </div>
      </div>
      <button onclick="openModal('backup')" style="width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;border:none;cursor:pointer;background:var(--accentL);color:var(--accent);font-family:var(--font);font-size:13px;margin-bottom:6px">💾 ${isRTL()?'النسخ الاحتياطية':'Backup & Restore'}</button>

    </div>

    ${pageHtml}

    </button>`).join('')}

  ${modalHtml}${confirmHtml}`;
}

function renderHome(){
  const tt=t();
  const myTx=userTx().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,12);
  const bal=totBal();
  const allTx=userTx();
  const totalE=allTx.filter(x=>x.type==='exp').reduce((s,x)=>s+x.amount,0);
  const totalI=allTx.filter(x=>x.type==='inc').reduce((s,x)=>s+x.amount,0);
  const totalTr=allTx.filter(x=>x.type==='tr').reduce((s,x)=>s+x.amount,0);
  const isAr=isRTL();

  // ===== Donut Chart SVG — Enhanced =====
  function donutChart(){
    const total=totalE+totalI+totalTr;
    const txCount=allTx.length;

    if(total===0) return `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:10px;opacity:.4">📊</div>
        <p style="margin:0;font-size:13px">${isAr?'لا توجد معاملات بعد':'No transactions yet'}</p>
      </div>`;

    const segments=[
      {val:totalE, color:'#ef4444', grad:['#ef4444','#f97316'], icon:'↓', label:isAr?'مصاريف':'Expenses'},
      {val:totalI, color:'#22c55e', grad:['#22c55e','#10b981'], icon:'↑', label:isAr?'دخل':'Income'},
      {val:totalTr,color:'#6366f1', grad:['#6366f1','#8b5cf6'], icon:'⇄', label:isAr?'تحويلات':'Transfers'},
    ].filter(s=>s.val>0);

    const R=78, r=50, cx=100, cy=100;
    const GAP=0.025; // gap between segments in radians
    const τ=2*Math.PI;
    let startAngle=-Math.PI/2;

    // build gradient defs
    const defs=segments.map((seg,i)=>`
      <linearGradient id="dg${i}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="${seg.grad[0]}"/>
        <stop offset="100%" stop-color="${seg.grad[1]}"/>
      </linearGradient>`).join('');

    // build paths with gap + hover effect via CSS
    const paths=segments.map((seg,i)=>{
      const pct=seg.val/total;
      const angle=pct*τ - GAP;
      const s=startAngle + GAP/2;
      const endAngle=s+angle;
      const x1=cx+R*Math.cos(s),    y1=cy+R*Math.sin(s);
      const x2=cx+R*Math.cos(endAngle), y2=cy+R*Math.sin(endAngle);
      const xi1=cx+r*Math.cos(s),   yi1=cy+r*Math.sin(s);
      const xi2=cx+r*Math.cos(endAngle),yi2=cy+r*Math.sin(endAngle);
      const large=angle>Math.PI?1:0;
      const d=`M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${xi2.toFixed(2)},${yi2.toFixed(2)} A${r},${r} 0 ${large},0 ${xi1.toFixed(2)},${yi1.toFixed(2)} Z`;
      startAngle+=pct*τ;
      // midpoint for label line
      const mid=s+angle/2;
      const lx=cx+(R+14)*Math.cos(mid); const ly=cy+(R+14)*Math.sin(mid);
      const pctLabel=Math.round(pct*100);
      return `<path d="${d}" fill="url(#dg${i})"
        style="cursor:pointer;transition:transform .2s;transform-origin:${cx}px ${cy}px"
        onmouseenter="this.style.transform='scale(1.04)'"
        onmouseleave="this.style.transform='scale(1)'"
        onclick="document.getElementById('donutLabel').innerHTML='<span style=\\'color:${seg.color};font-size:22px;font-weight:800\\'>${pctLabel}%</span><br><span style=\\'font-size:11px;color:var(--text2)\\'>${seg.label}</span><br><span style=\\'font-size:11px;font-weight:600\\'>${fmt(seg.val)}</span>'"
      />
      ${pctLabel>=8?`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="700" fill="${seg.color}" font-family="inherit" opacity="0.9">${pctLabel}%</text>`:''}`;
    }).join('');

    // legend rows
    const legend=segments.map(seg=>{
      const pct=(seg.val/total*100).toFixed(1);
      const count=allTx.filter(x=>x.type===(seg.label===( isAr?'مصاريف':'Expenses')?'exp':seg.label===(isAr?'دخل':'Income')?'inc':'tr')).length;
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:var(--bg3);margin-bottom:8px;cursor:pointer"
        onclick="document.getElementById('donutLabel').innerHTML='<span style=\\'color:${seg.color};font-size:22px;font-weight:800\\'>${pct}%</span><br><span style=\\'font-size:11px;color:var(--text2)\\'>${seg.label}</span><br><span style=\\'font-size:11px;font-weight:600\\'>${fmt(seg.val)}</span>'">
        <div style="width:34px;height:34px;border-radius:10px;background:${seg.color}22;display:flex;align-items:center;justify-content:center;color:${seg.color};font-size:16px;flex-shrink:0">${seg.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span style="font-size:12px;font-weight:600">${seg.label}</span>
            <span style="font-size:13px;font-weight:800;color:${seg.color}">${pct}%</span>
          </div>
          <div style="height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:3px">
            <div style="height:100%;width:${pct}%;background:${seg.color};border-radius:3px;transition:width .8s ease"></div>
          </div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:10px;color:var(--text2)">${fmt(seg.val)}</span>
            <span style="font-size:10px;color:var(--text3)">${count} ${isAr?'معاملة':'txns'}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
        <div style="position:relative">
          <svg width="200" height="200" viewBox="0 0 200 200" style="display:block">
            <defs>${defs}</defs>
            <!-- shadow -->
            <circle cx="${cx}" cy="${cy}" r="${R+4}" fill="var(--bg3)" opacity="0.5"/>
            ${paths}
            <!-- inner hole -->
            <circle cx="${cx}" cy="${cy}" r="${r-1}" fill="var(--bg2)"/>
            <!-- center content -->
            <foreignObject x="${cx-40}" y="${cy-32}" width="80" height="64">
              <div id="donutLabel" xmlns="http://www.w3.org/1999/xhtml"
                style="text-align:center;line-height:1.4;font-family:inherit">
                <span style="font-size:22px;font-weight:800;color:var(--text)">${txCount}</span><br>
                <span style="font-size:10px;color:var(--text2)">${isAr?'معاملة':'transactions'}</span>
              </div>
            </foreignObject>
          </svg>
        </div>
        <div style="width:100%">${legend}</div>
      </div>`;
  }
  // ===========================

  // حساب الشهر الحالي مقارنةً بالشهر السابق
  const now=new Date();
  const thisMonth=allTx.filter(tx=>{ const d=new Date(tx.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const lastMonthDate=new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastMonth=allTx.filter(tx=>{ const d=new Date(tx.date); return d.getMonth()===lastMonthDate.getMonth()&&d.getFullYear()===lastMonthDate.getFullYear(); });
  const thisMonthExp=thisMonth.filter(x=>x.type==='exp').reduce((s,x)=>s+x.amount,0);
  const lastMonthExp=lastMonth.filter(x=>x.type==='exp').reduce((s,x)=>s+x.amount,0);
  const expTrend=lastMonthExp>0?((thisMonthExp-lastMonthExp)/lastMonthExp*100).toFixed(1):null;
  const thisMonthInc=thisMonth.filter(x=>x.type==='inc').reduce((s,x)=>s+x.amount,0);
  const net=thisMonthInc-thisMonthExp;
  // أعلى تصنيف مصاريف هذا الشهر
  const topCat=st.cats.map(c=>({
    c, val:thisMonth.filter(tx=>tx.type==='exp'&&tx.categoryId===c.id).reduce((s,tx)=>s+tx.amount,0)
  })).filter(x=>x.val>0).sort((a,b)=>b.val-a.val)[0];

  const greetHour=now.getHours();
  const greet=isAr
    ?(greetHour<12?'صباح الخير':greetHour<17?'مساء الخير':'مساء النور')
    :(greetHour<12?'Good morning':greetHour<17?'Good afternoon':'Good evening');

  // حساب نسبة الإنفاق من الدخل
  const savingsTarget=st.savingsTarget??20;
  const idealSpend=100-savingsTarget; // e.g. 80% spending = 20% savings
  const spendRatio=thisMonthInc>0?Math.min(100,(thisMonthExp/thisMonthInc*100)):0;
  const spendDanger=spendRatio>idealSpend;
  const userName=st.cur?.name?.split(' ')[0]||st.cur?.email?.split('@')[0]||'';

  return`
  <!-- بطاقة الرصيد الرئيسية -->
  <div class="bal-grad-1" style="border-radius:22px;padding:22px 20px 20px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden">
    <div class="hero-shimmer"></div>
    <div style="position:absolute;top:-30px;${isAr?'left':'right'}:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.08)"></div>
    <div style="position:absolute;bottom:-20px;${isAr?'right':'left'}:-10px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.05)"></div>
    <p style="margin:0 0 2px;opacity:.75;font-size:12px">${greet}، ${userName} 👋</p>
    <p style="margin:0 0 6px;opacity:.7;font-size:11px">${tt.bal}</p>
    <h2 style="margin:0 0 4px;font-size:32px;font-weight:800;letter-spacing:-1px" class="num-roll">${fmt(bal)}</h2>
    <p style="margin:0 0 14px;opacity:.6;font-size:10px">${visAccs().length} ${tt.activeAccs}</p>
    ${thisMonthInc>0?`
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:10px;opacity:.75">${isAr?'الإنفاق من الدخل':'Spending of income'}</span>
        <span style="font-size:10px;font-weight:700;opacity:.9">${spendRatio.toFixed(0)}% <span style="opacity:.6">/ ${isAr?`هدف التوفير ${savingsTarget}%`:`Save ${savingsTarget}%`}</span></span>
      </div>
      <div style="height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;position:relative">
        <div style="height:100%;width:${spendRatio}%;background:${spendDanger?'#fbbf24':'rgba(255,255,255,.9)'};border-radius:4px;transition:width 1s ease"></div>
        <!-- خط هدف التوفير -->
        <div style="position:absolute;top:0;bottom:0;left:${idealSpend}%;width:2px;background:rgba(255,255,255,.5);border-radius:2px" title="${isAr?'حد الإنفاق المستهدف':'Target spend limit'}"></div>
      </div>
      ${spendDanger?`<p style="margin:4px 0 0;font-size:9px;opacity:.8">⚠️ ${isAr?`تجاوزت هدف التوفير (${savingsTarget}%)`:`Savings goal at risk (${savingsTarget}%)`}</p>`:`<p style="margin:4px 0 0;font-size:9px;opacity:.7">✅ ${isAr?`على المسار — وفّرت ${Math.max(0,(100-spendRatio)).toFixed(0)}% حتى الآن`:`On track — saved ${Math.max(0,(100-spendRatio)).toFixed(0)}% so far`}</p>`}
    </div>`:''}
    <div style="display:flex;gap:20px">
      <div>
        <p style="margin:0;opacity:.65;font-size:10px">${isAr?'دخل الشهر':'This month income'}</p>
        <p style="margin:0;font-size:13px;font-weight:700">+${fmt(thisMonthInc)}</p>
      </div>
      <div style="width:1px;background:rgba(255,255,255,.2)"></div>
      <div>
        <p style="margin:0;opacity:.65;font-size:10px">${isAr?'مصاريف الشهر':'This month expenses'}</p>
        <p style="margin:0;font-size:13px;font-weight:700">-${fmt(thisMonthExp)}</p>
      </div>
      <div style="width:1px;background:rgba(255,255,255,.2)"></div>
      <div>
        <p style="margin:0;opacity:.65;font-size:10px">${isAr?'الصافي':'Net'}</p>
        <p style="margin:0;font-size:13px;font-weight:700">${net>=0?'+':''}${fmt(net)}</p>
      </div>
    </div>
    <button onclick="openModal('qadd')" style="position:absolute;top:14px;${isAr?'left':'right'}:14px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.3);cursor:pointer;border-radius:20px;padding:7px 16px;display:flex;align-items:center;gap:6px;color:#fff;font-family:var(--font);font-size:12px;font-weight:700;backdrop-filter:blur(8px);transition:all .2s" onmouseenter="this.style.background='rgba(255,255,255,.32)'" onmouseleave="this.style.background='rgba(255,255,255,.22)'">
      ${svg('plus',14)} ${isAr?'+ إضافة':'+ Add'}
    </button>
  </div>

  <!-- شريط سريع -->
  <div class="quick-strip">
    <div class="quick-strip-item" onclick="navTo('accs')">
      <div style="font-size:22px;margin-bottom:4px">🏦</div>
      <p style="margin:0;font-size:18px;font-weight:800;color:var(--accent)">${visAccs().length}</p>
      <p style="margin:0;font-size:10px;color:var(--text2)">${isAr?'حسابات':'Accounts'}</p>
    </div>
    <div class="quick-strip-item" onclick="navTo('txs')">

function renderTxList(){
  // Update only the transactions list without re-rendering the whole page
  // This preserves the search input focus and cursor position
  const container = document.getElementById('txListContainer');
  if(!container){ render(); return; }
  const uid=isAdmin()?(st.selUserId||st.cur.id):st.cur.id;
  const filter=st._txFilter||'all';
  let txs=userTx(uid).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(filter!=='all') txs=txs.filter(tx=>tx.type===filter);
  const q=(st._txQ||'').trim();
  if(q){
    const qLow=q.toLowerCase(); const qNum=parseFloat(q);
    txs=txs.filter(tx=>
      (tx.note||'').toLowerCase().includes(qLow)||
      (getCat(tx.categoryId)||'').toLowerCase().includes(qLow)||
      (getAcc(tx.accountId)?.name||'').toLowerCase().includes(qLow)||
      (!isNaN(qNum)&&Math.abs(tx.amount-qNum)<qNum*0.01)||
      tx.date.includes(q)
    );
  }
  if(st._txDateFrom) txs=txs.filter(tx=>tx.date>=st._txDateFrom);
  if(st._txDateTo)   txs=txs.filter(tx=>tx.date<=st._txDateTo);
  const tt=t(); const isAr2=isRTL();
  // Update count label
  const countEl=document.getElementById('txCountLabel');
  if(countEl) countEl.textContent=(q||st._txDateFrom||st._txDateTo)?(isAr2?txs.length+' نتيجة':txs.length+' results'):'';
  // Build list HTML
  let html='';
  if(txs.length===0){
    html=`<div class="empty-state card"><div class="empty-icon">🔍</div><h3>${isAr2?'لا توجد نتائج':'No results'}</h3><p>${isAr2?'جرب بحثاً مختلفاً':'Try a different search'}</p></div>`;
  } else {
    const groups={};
    txs.forEach(tx=>{ if(!groups[tx.date]) groups[tx.date]=[]; groups[tx.date].push(tx); });
    const today=new Date(); const yesterday=new Date(); yesterday.setDate(today.getDate()-1);
    html=Object.entries(groups).map(([date,gtxs])=>{
      const dayTotal=gtxs.reduce((s,tx)=>tx.type==='exp'?s-tx.amount:tx.type==='inc'?s+tx.amount:s,0);
      const d=new Date(date);
      let dateLabel=d.toLocaleDateString(isAr2?'ar':'en',{weekday:'long',month:'short',day:'numeric'});
      if(d.toDateString()===today.toDateString()) dateLabel=(isAr2?'اليوم':'Today')+' · '+d.toLocaleDateString(isAr2?'ar':'en',{month:'short',day:'numeric'});
      else if(d.toDateString()===yesterday.toDateString()) dateLabel=(isAr2?'أمس':'Yesterday')+' · '+d.toLocaleDateString(isAr2?'ar':'en',{month:'short',day:'numeric'});
      return`<div style="margin-bottom:4px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px 4px">
          <span class="tx-date-group">${dateLabel}</span>
          <span style="font-size:11px;font-weight:700;color:${dayTotal>=0?'#22c55e':'#ef4444'}">${dayTotal>=0?'+':''}${fmt(dayTotal)}</span>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          ${gtxs.map(tx=>{
            const isE=tx.type==='exp';const isT=tx.type==='tr';
            const col=isE?'#ef4444':isT?'#6366f1':'#22c55e';
            const cat=st.cats.find(c=>c.id===tx.categoryId);
            const catEmoji=cat?.emoji||(isE?'💸':isT?'🔄':'💰');
            return`<div class="tx-row" data-id="${tx.id}" onclick="openTxEdit(event)" style="padding:10px 12px;margin:0;cursor:pointer">
              <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
                <div style="width:38px;height:38px;border-radius:12px;background:${col}15;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${catEmoji}</div>
                <div style="flex:1;min-width:0">
                  <p style="margin:0;font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${getCat(tx.categoryId)||tx.note||(isAr2?'معاملة':'Transaction')}</p>
                  <p style="margin:0;font-size:11px;color:var(--text2)">${getAcc(tx.accountId)?.name||''}${tx.note&&getCat(tx.categoryId)?' · '+tx.note:''}</p>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                <span style="font-weight:800;color:${col};font-size:14px">${isE?'−':isT?'⇄':'+'}${fmt(tx.amount)}</span>
                <button data-id="${tx.id}" onclick="event.stopPropagation();openModal('editTx',this.getAttribute('data-id'))" class="iBtn" style="width:28px;height:28px">${svg('edit',12)}</button>
                <button data-id="${tx.id}" onclick="event.stopPropagation();deleteTx(this.getAttribute('data-id'))" class="iBtn" style="color:#ef4444;width:28px;height:28px">${svg('trash',12)}</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  }
  container.innerHTML=html;
}

      <div class="empty-icon">💸</div>
      <h3>${tt.noTx}</h3>
      <p>${isRTL()?'ابدأ بإضافة أول معاملة لك':'Start by adding your first transaction'}</p>
      <button onclick="openModal('addTx')" class="btn btn-p" style="display:flex;align-items:center;gap:6px">${svg('plus',14)} ${tt.addTx}</button>
    </div>`;
    // تجميع حسب التاريخ
    const groups={};
    txs.forEach(tx=>{ if(!groups[tx.date]) groups[tx.date]=[]; groups[tx.date].push(tx); });
    const isAr2=isRTL();
    return Object.entries(groups).map(([date,gtxs])=>{
      const dayTotal=gtxs.reduce((s,tx)=>tx.type==='exp'?s-tx.amount:tx.type==='inc'?s+tx.amount:s,0);
      const d=new Date(date);
      const today=new Date(); const yesterday=new Date(); yesterday.setDate(today.getDate()-1);
      let dateLabel=d.toLocaleDateString(isAr2?'ar':'en',{weekday:'long',month:'short',day:'numeric'});
      if(d.toDateString()===today.toDateString()) dateLabel=(isAr2?'اليوم':'Today')+' · '+d.toLocaleDateString(isAr2?'ar':'en',{month:'short',day:'numeric'});
      else if(d.toDateString()===yesterday.toDateString()) dateLabel=(isAr2?'أمس':'Yesterday')+' · '+d.toLocaleDateString(isAr2?'ar':'en',{month:'short',day:'numeric'});
      return`
      <div style="margin-bottom:4px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px 4px">
          <span class="tx-date-group">${dateLabel}</span>
          <span style="font-size:11px;font-weight:700;color:${dayTotal>=0?'#22c55e':'#ef4444'}">${dayTotal>=0?'+':''}${fmt(dayTotal)}</span>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          ${gtxs.map(tx=>{
            const isE=tx.type==='exp';const isT=tx.type==='tr';
            const col=isE?'#ef4444':isT?'#6366f1':'#22c55e';
            const cat=st.cats.find(c=>c.id===tx.categoryId);
            const catEmoji=cat?.emoji||(isE?'💸':isT?'🔄':'💰');
            return`<div class="tx-row" data-id="${tx.id}" onclick="openTxEdit(event)" style="padding:10px 12px;margin:0;cursor:pointer">
              <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
                <div style="width:38px;height:38px;border-radius:12px;background:${col}15;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${catEmoji}</div>
                <div style="flex:1;min-width:0">
                  <p style="margin:0;font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${getCat(tx.categoryId)||tx.note||(isAr2?'معاملة':'Transaction')}</p>
                  <p style="margin:0;font-size:11px;color:var(--text2)">${getAcc(tx.accountId)?.name||''}${tx.note&&getCat(tx.categoryId)?` · ${tx.note}`:''}</p>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                <span style="font-weight:800;color:${col};font-size:14px">${isE?'−':isT?'⇄':'+'}${fmt(tx.amount)}</span>
                <button data-id="${tx.id}" onclick="event.stopPropagation();openModal('editTx',this.getAttribute('data-id'))" class="iBtn" style="width:28px;height:28px">${svg('edit',12)}</button>
                <button data-id="${tx.id}" onclick="event.stopPropagation();deleteTx(this.getAttribute('data-id'))" class="iBtn" style="color:#ef4444;width:28px;height:28px">${svg('trash',12)}</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  })()}
  </div>
  ${txs.length>0?`
  <div style="margin-top:14px;padding:12px;background:var(--accentL);border-radius:12px;border:1px solid rgba(99,102,241,.15)">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;text-align:center">
      <div>
        <p style="margin:0;font-size:10px;color:var(--text2)">${isRTL()?'مصاريف':'Expenses'}</p>
        <p style="margin:0;font-size:14px;font-weight:800;color:#ef4444">−${fmt(txs.filter(x=>x.type==='exp').reduce((s,x)=>s+x.amount,0))}</p>
      </div>
      <div>
        <p style="margin:0;font-size:10px;color:var(--text2)">${isRTL()?'دخل':'Income'}</p>
        <p style="margin:0;font-size:14px;font-weight:800;color:#22c55e">+${fmt(txs.filter(x=>x.type==='inc').reduce((s,x)=>s+x.amount,0))}</p>
      </div>
      <div>
        <p style="margin:0;font-size:10px;color:var(--text2)">${isRTL()?'الصافي':'Net'}</p>
        <p style="margin:0;font-size:14px;font-weight:800;color:var(--accent)">${(()=>{const n=txs.filter(x=>x.type==='inc').reduce((s,x)=>s+x.amount,0)-txs.filter(x=>x.type==='exp').reduce((s,x)=>s+x.amount,0);return(n>=0?'+':'')+fmt(n)})()}</p>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="expCSV()" class="btn btn-s btn-sm" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px">${svg('dl',14)}${tt.expCSV}</button>
      <button onclick="expPDF()" class="btn btn-sm btn-pdf" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px">${svg('dl',14)}PDF</button>
    </div>
  </div>`:''}`;
}

function renderCats(){
  const tt=t();
  const isAr=isRTL();

  // خريطة إيموجي للتصنيفات
  const EMOJI_MAP={
    // عربي
    'طعام':'🍔','مطعم':'🍽️','طعام ومشروبات':'🍔','مواصلات':'🚗','سفر':'✈️',
    'تسوق':'🛍️','صحة':'💊','رياضة':'💪','ترفيه':'🎮','تعليم':'📚',
    'فواتير':'💡','إيجار':'🏠','راتب':'💼','هدايا':'🎁','ادخار':'🏦',
    'استثمار':'📈','أخرى':'📦','متنوع':'🗂️','ملابس':'👕','اتصالات':'📱',
    'نقل':'🚕','سكن':'🏡','عمل':'💼','مشروع':'🚀',
    // English
    'food':'🍔','restaurant':'🍽️','transport':'🚗','travel':'✈️',
    'shopping':'🛍️','health':'💊','sport':'💪','sports':'💪',
    'entertainment':'🎮','education':'📚','bills':'💡','rent':'🏠',
    'salary':'💼','gifts':'🎁','savings':'🏦','investment':'📈',
    'other':'📦','misc':'🗂️','clothes':'👕','clothing':'👕',
    'phone':'📱','internet':'🌐','housing':'🏡','work':'💼',
  };

  // أنيميشن CSS لكل أيقونة
  const animStyles=`
    <style>
    @keyframes catBounce{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-5px) scale(1.15)}70%{transform:translateY(-2px) scale(1.05)}}
    @keyframes catPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
    @keyframes catWiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
    @keyframes catSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes catFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .cat-icon-wrap{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:11px;font-size:19px;flex-shrink:0;transition:transform .2s}
    .cat-icon-wrap:hover .cat-emoji{animation:catBounce .6s ease forwards}
    .cat-row-item{transition:all .2s;border-radius:12px}
    .cat-row-item:hover{background:var(--accentL);transform:translateX(${isAr?'4px':'-4px'})}
    </style>`;

  const ANIMS=['catBounce','catPulse','catWiggle','catFloat','catBounce','catPulse'];

  function getEmoji(c){
    // 1. إذا التصنيف عنده emoji مباشرة
    if(c.emoji) return c.emoji;
    // 2. بحث في الخريطة
    const a=(c.ar||'').toLowerCase();
    const e=(c.en||'').toLowerCase();
    // رتّب المفاتيح من الأطول للأقصر لتجنب التطابق الجزئي الخاطئ
    const entries=Object.entries(EMOJI_MAP).sort((x,y)=>y[0].length-x[0].length);
    for(const[k,v] of entries){
      if(a===k||e===k||a.includes(k)||e.includes(k)) return v;
    }
    // 3. fallback
    const fallbacks=['🏷️','💰','📌','⭐','🎯','🔖','💎','🌟'];
    return fallbacks[((c.ar||c.en||'?').charCodeAt(0))%fallbacks.length];
  }

  const txCountPerCat = Object.fromEntries(
    st.cats.map(c=>[c.id, userTx().filter(tx=>tx.categoryId===c.id).length])
  );

  return`
  ${animStyles}
  <div class="row" style="margin-bottom:16px">
    <span class="section-title" style="margin:0">${tt.cats}</span>
    <button onclick="openModal('addCat')" class="btn btn-p btn-sm" style="display:flex;align-items:center;gap:4px">${svg('plus',14)}${isAr?'إضافة':'Add'}</button>
  </div>
  <div class="card" style="padding:8px">
    ${st.cats.map((c,i)=>{
      const color=COLORS[i%COLORS.length];
      const emoji=getEmoji(c);
      const anim=ANIMS[i%ANIMS.length];
      const count=txCountPerCat[c.id]||0;
      const isDefault=['c1','c2','c3','c4','c5','c6','c7','c8'].includes(c.id);
      return`<div class="tx-row cat-row-item" style="padding:10px 8px;margin-bottom:2px">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <div class="cat-icon-wrap" style="background:${color}18;border:1.5px solid ${color}33" data-anim="${anim}"
            onmouseenter="var e=this.querySelector('.cat-emoji');e.style.animation='none';void e.offsetWidth;e.style.animation=this.dataset.anim+' .6s ease forwards'"
            onmouseleave="this.querySelector('.cat-emoji').style.animation=''">
            <span class="cat-emoji" style="display:block">${emoji}</span>
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:13px;font-weight:600;color:var(--text)">${isAr?c.ar:c.en}</span>
              <span style="font-size:10px;color:var(--text3)">${isAr?c.en:c.ar}</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
              <div style="width:40px;height:3px;border-radius:2px;background:${color};opacity:.7"></div>
              <span style="font-size:10px;color:var(--text3)">${count} ${isAr?'معاملة':'txns'}</span>
              ${isDefault?`<span style="font-size:9px;background:${color}20;color:${color};padding:1px 6px;border-radius:8px;font-weight:600">${isAr?'افتراضي':'default'}</span>`:''}
            </div>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button onclick="openModal('editCat','${c.id}')" class="iBtn" style="border-radius:8px">${svg('edit',13)}</button>
          ${!isDefault?`<button onclick="deleteCat('${c.id}')" class="iBtn" style="color:#ef4444;border-radius:8px">${svg('trash',13)}</button>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderRpts(){
  const tt=t();
  const isAr=isRTL();
  const uid=isAdmin()?(st.selUserId||st.cur.id):st.cur.id;
  const period=st._rptPeriod||'mmonthly';
  const now=new Date();
  let filtered=userTx(uid);
  if(period==='weekly'){const w=new Date(now);w.setDate(w.getDate()-7);filtered=filtered.filter(tx=>new Date(tx.date)>=w);}
  else if(period==='mmonthly'){filtered=filtered.filter(tx=>new Date(tx.date).getMonth()===now.getMonth()&&new Date(tx.date).getFullYear()===now.getFullYear());}
  const totalE=filtered.filter(x=>x.type==='exp').reduce((s,x)=>s+x.amount,0);
  const totalI=filtered.filter(x=>x.type==='inc').reduce((s,x)=>s+x.amount,0);
  const net=totalI-totalE;
  const savingsRate=totalI>0?Math.max(0,((totalI-totalE)/totalI*100)):0;

  const catData=st.cats.map((c,i)=>{
    const val=filtered.filter(tx=>tx.type==='exp'&&tx.categoryId===c.id).reduce((s,tx)=>s+tx.amount,0);
    return{label:isAr?c.ar:c.en,emoji:c.emoji,value:val,color:COLORS[i%COLORS.length]};
  }).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
  const maxCat=catData[0]?.value||1;

  // SVG Pie Chart
  function pieChart(data,total){
    if(!data.length||!total) return`<p style="color:var(--text3);font-size:12px;text-align:center;padding:20px">${tt.noData}</p>`;
    const cx=80,cy=80,r=68,gap=2;
    let angle=-Math.PI/2;
    const slices=data.map(d=>{
      const pct=d.value/total;
      const a=pct*Math.PI*2;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      angle+=a;
      const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
      const large=a>Math.PI?1:0;
      const ir=50;
      const ix1=cx+ir*Math.cos(angle-a),iy1=cy+ir*Math.sin(angle-a);
      const ix2=cx+ir*Math.cos(angle),iy2=cy+ir*Math.sin(angle);
      return`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${ir},${ir} 0 ${large},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${d.color}" opacity=".9"/>`;
    });
    return`<svg viewBox="0 0 160 160" style="width:160px;height:160px">
      ${slices.join('')}
      <circle cx="${cx}" cy="${cy}" r="42" fill="var(--bg2)"/>
      <text x="${cx}" y="${cy-6}" text-anchor="middle" fill="var(--text2)" font-size="9" font-family="inherit">${isAr?'المصاريف':'Expenses'}</text>
      <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="bold" font-family="inherit">${fmt(total)}</text>
    </svg>`;
  }

  // 12-month trend
  const months12=Array.from({length:12},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-11+i,1);
    const mTxs=userTx(uid).filter(tx=>{const td=new Date(tx.date);return td.getMonth()===d.getMonth()&&td.getFullYear()===d.getFullYear();});
    return{
      label:d.toLocaleDateString(isAr?'ar':'en',{month:'short'}),
      exp:mTxs.filter(t=>t.type==='exp').reduce((s,t)=>s+t.amount,0),
      inc:mTxs.filter(t=>t.type==='inc').reduce((s,t)=>s+t.amount,0),
      current:i===11
    };
  });
  const maxVal=Math.max(...months12.flatMap(m=>[m.exp,m.inc]),1);
  const chartH=90;

  return`
  ${isAdmin()?`<div class="pill-tabs">${[{id:st.cur.id,label:tt.myAcc},...subUsers().map(u=>({id:u.id,label:u.name||u.email}))].map(u=>`<button onclick="st.selUserId='${u.id}';render()" class="pill-tab${(st.selUserId||st.cur.id)===u.id?' active':''}">${u.label}</button>`).join('')}</div>`:''}

  <!-- فلتر الفترة -->
  <div class="pill-tabs">
    <button onclick="st._rptPeriod='weekly';render()" class="pill-tab${period==='weekly'?' active':''}">${tt.weekly}</button>
    <button onclick="st._rptPeriod='mmonthly';render()" class="pill-tab${period==='mmonthly'?' active':''}">${tt.mmonthly}</button>
    <button onclick="st._rptPeriod='all';render()" class="pill-tab${period==='all'?' active':''}">${tt.all}</button>
  </div>

  <!-- ملخص مالي -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    <div class="stat-card" style="border-right:3px solid #ef4444">
      <p style="font-size:10px;color:var(--text2);margin-bottom:4px">${tt.totalExp}</p>
      <p class="stat-val" style="color:#ef4444;font-size:18px">−${fmt(totalE)}</p>
    </div>
    <div class="stat-card" style="border-right:3px solid #22c55e">
      <p style="font-size:10px;color:var(--text2);margin-bottom:4px">${tt.totalInc}</p>
      <p class="stat-val" style="color:#22c55e;font-size:18px">+${fmt(totalI)}</p>
    </div>
    <div class="stat-card" style="border-right:3px solid var(--accent)">
      <p style="font-size:10px;color:var(--text2);margin-bottom:4px">${tt.net}</p>
      <p class="stat-val" style="color:${net>=0?'#22c55e':'#ef4444'};font-size:18px">${fmt(net)}</p>
    </div>
    <div class="stat-card" style="border-right:3px solid #f59e0b">
      <p style="font-size:10px;color:var(--text2);margin-bottom:4px">${isAr?'نسبة التوفير':'Savings Rate'}</p>
      <p class="stat-val" style="color:#f59e0b;font-size:18px">${savingsRate.toFixed(1)}%</p>
    </div>
  </div>

  <!-- Pie Chart + تصنيفات -->
  <div class="card" style="margin-bottom:14px">
    <p style="font-size:13px;font-weight:700;margin-bottom:12px">🥧 ${tt.expDist}</p>
    ${catData.length===0?`<p class="no-data">${tt.noData}</p>`:`
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="flex-shrink:0">${pieChart(catData,totalE)}</div>
      <div style="flex:1;min-width:140px">
        ${catData.slice(0,6).map(d=>`
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">
          <div style="width:10px;height:10px;border-radius:3px;background:${d.color};flex-shrink:0"></div>
          <span style="font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.emoji||''} ${d.label}</span>
          <span style="font-size:11px;font-weight:700;color:${d.color}">${((d.value/totalE)*100).toFixed(0)}%</span>
        </div>`).join('')}
      </div>
    </div>
    <!-- Bar Chart -->
    <div style="margin-top:14px">
      ${catData.map(d=>`
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:11px">${d.emoji||''} ${d.label}</span>
          <span style="font-size:11px;font-weight:700">${fmt(d.value)}</span>
        </div>
        <div style="height:7px;background:var(--bg3);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${(d.value/maxCat*100).toFixed(1)}%;background:${d.color};border-radius:4px;transition:width .6s ease"></div>
        </div>
      </div>`).join('')}
    </div>`}
  </div>

  <!-- مخطط 12 شهر -->
  <div class="card" style="margin-bottom:14px">
    <p style="font-size:13px;font-weight:700;margin-bottom:12px">📈 ${isAr?'اتجاه 12 شهر':'12-Month Trend'}</p>
    <div style="display:flex;align-items:flex-end;gap:3px;height:${chartH}px;overflow-x:auto">
      ${months12.map((m,i)=>`
      <div style="flex:1;min-width:18px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:1px">
        <div style="width:100%;display:flex;gap:1px;align-items:flex-end;justify-content:center;height:${chartH-12}px">
          <div title="${isAr?'دخل':'Inc'}: ${fmt(m.inc)}" style="flex:1;background:#22c55e;border-radius:2px 2px 0 0;height:${m.inc>0?Math.max(3,(m.inc/maxVal*(chartH-12)).toFixed(0)):2}px;opacity:${m.current?1:.65};transition:height .5s"></div>
          <div title="${isAr?'مصروف':'Exp'}: ${fmt(m.exp)}" style="flex:1;background:#ef4444;border-radius:2px 2px 0 0;height:${m.exp>0?Math.max(3,(m.exp/maxVal*(chartH-12)).toFixed(0)):2}px;opacity:${m.current?1:.65};transition:height .5s"></div>
        </div>
        <span style="font-size:8px;color:${m.current?'var(--accent)':'var(--text3)'};font-weight:${m.current?'700':'400'};white-space:nowrap">${m.label}</span>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;justify-content:center">
      <div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:#22c55e"></div><span style="font-size:10px;color:var(--text2)">${isAr?'دخل':'Income'}</span></div>
      <div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:#ef4444"></div><span style="font-size:10px;color:var(--text2)">${isAr?'مصاريف':'Expenses'}</span></div>
    </div>
  </div>

  <!-- أعلى المصاريف -->
  ${catData.length>0?`
  <div class="card" style="margin-bottom:14px">
    <p style="font-size:13px;font-weight:700;margin-bottom:10px">🏆 ${isAr?'أعلى 3 تصنيفات':'Top 3 Categories'}</p>
    ${catData.slice(0,3).map((d,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px;background:${d.color}12;border-radius:10px;margin-bottom:6px">
      <div style="width:30px;height:30px;border-radius:50%;background:${d.color};display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:800;flex-shrink:0">${i+1}</div>
      <div style="flex:1">
        <p style="margin:0;font-size:12px;font-weight:700">${d.emoji||''} ${d.label}</p>
        <p style="margin:0;font-size:10px;color:var(--text2)">${((d.value/totalE)*100).toFixed(1)}% ${isAr?'من الإجمالي':'of total'}</p>
      </div>

function renderNotifs(){
  const tt=t();
  const notifs=adminNotifs().sort((a,b)=>new Date(b.time)-new Date(a.time));
  const timeAgo=(iso)=>{
    const diff=(new Date()-new Date(iso))/1000;
    if(diff<60)return isRTL()?'الآن':'Just now';
    if(diff<3600)return Math.floor(diff/60)+(isRTL()?' دقيقة':' min ago');
    if(diff<86400)return Math.floor(diff/3600)+(isRTL()?' ساعة':' hr ago');
    return Math.floor(diff/86400)+(isRTL()?' يوم':' days ago');
  };
  return`
  <div class="row" style="margin-bottom:16px">
    <span class="section-title" style="margin:0">${tt.notifs}</span>
    <div style="display:flex;gap:6px">
      <button onclick="markAllRead()" class="btn btn-s btn-sm">${tt.markRead}</button>
      <button onclick="clearNotifs()" class="btn btn-sm btn-d">${tt.clearAll}</button>
    </div>
  </div>
  <div class="card">
    ${notifs.length===0?`<p class="no-data">${tt.noNotifs}</p>`:notifs.map(n=>`
    <div class="tx-row" style="opacity:${n.read?.65:1}">
      <div style="display:flex;gap:10px;align-items:center">
        <div style="width:34px;height:34px;border-radius:50%;background:${n.read?'var(--bg3)':'var(--accentL)'};display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0">${svg('bell',16)}</div>
        <div>

          <p style="margin:0;font-size:11px;color:var(--text2)">${timeAgo(n.time)}</p>
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderConfirm(){
  const tt=t();
  const title=st.confirm.title||tt.confirm;
  const icon=st.confirm.icon||'⚠️';
  const btnColor=st.confirm.danger===false?'var(--accent)':'#ef4444';
  const okLabel=st.confirm.okLabel||tt.yes;
  const cancelLabel=st.confirm.cancelLabel||(isRTL()?'إلغاء':'Cancel');
  const hasCancelFn=!!st.confirm.cancelFn;
  return`<div class="modal-bg"><div class="modal" style="max-width:310px;text-align:center">
    <div style="font-size:36px;margin-bottom:10px">${icon}</div>
    <p style="font-size:15px;font-weight:700;margin-bottom:8px">${title}</p>
    <p style="color:var(--text2);font-size:13px;margin-bottom:20px;white-space:pre-line">${st.confirm.msg||''}</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;gap:10px">
        <button class="btn btn-s" style="flex:1" onclick="${hasCancelFn?'(async()=>{const fn=st.confirm.cancelFn;st.confirm=null;await fn();})()':'st.confirm=null;render()'}">
          ${hasCancelFn?(isRTL()?'🔤 غيّر الرمز فقط':'🔤 Symbol only'):cancelLabel}
        </button>
        <button class="btn" style="flex:1;background:${btnColor};color:#fff" onclick="(async()=>{const fn=st.confirm.fn;st.confirm=null;await fn();})()">
          ${okLabel}
        </button>
      </div>
      ${hasCancelFn?`<button class="btn btn-s" style="width:100%;font-size:12px" onclick="st.confirm=null;render()">${isRTL()?'❌ إلغاء':'❌ Cancel'}</button>`:''}
    </div>
  </div></div>`;
}

function bindAuth(){document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();},{once:true});}
function bindMain(){}

function toggleMenu(){
  const d=document.getElementById('drawer');const o=document.getElementById('drawer-overlay');
  if(!d)return;
  const open=d.getAttribute('data-open')==='1';
  d.setAttribute('data-open',open?'0':'1');
  d.style.transform=open?`translateX(${isRTL()?'100%':'-100%'})`:'translateX(0)';
  o.style.display=open?'none':'block';
}
function closeMenu(){
  const d=document.getElementById('drawer');const o=document.getElementById('drawer-overlay');
  if(d){d.style.transform=`translateX(${isRTL()?'100%':'-100%'})`;d.setAttribute('data-open','0');}

}

    const resp=await fetch('https://api.anthropic.com/v1/messages',{

function _guessEmoji(ar,en){
  const MAP={
    'طعام':'🍔','مطعم':'🍽️','مواصلات':'🚗','سفر':'✈️','تسوق':'🛍️',
    'صحة':'💊','رياضة':'💪','ترفيه':'🎮','تعليم':'📚','فواتير':'💡',
    'إيجار':'🏠','راتب':'💼','هدايا':'🎁','ادخار':'🏦','استثمار':'📈',
    'أخرى':'📦','متنوع':'🗂️','ملابس':'👕','اتصالات':'📱','نقل':'🚕',
    'سكن':'🏡','مشروع':'🚀','food':'🍔','restaurant':'🍽️','transport':'🚗',
    'travel':'✈️','shopping':'🛍️','health':'💊','sport':'💪','entertainment':'🎮',
    'education':'📚','bills':'💡','rent':'🏠','salary':'💼','gifts':'🎁',
    'savings':'🏦','investment':'📈','other':'📦','clothes':'👕','phone':'📱',
    'internet':'🌐','housing':'🏡','work':'💼',
  };
  const a=(ar||'').toLowerCase(), e=(en||'').toLowerCase();
  const entries=Object.entries(MAP).sort((x,y)=>y[0].length-x[0].length);
  for(const[k,v] of entries){ if(a.includes(k)||e.includes(k)) return v; }
  const fallbacks=['🏷️','💰','📌','⭐','🎯','🔖','💎','🌟'];
  return fallbacks[((ar||en||'?').charCodeAt(0))%fallbacks.length];
}

    if(a.id===fromId)return{...a,balance:a.balance-amt};
    if(a.id===toId)return{...a,balance:a.balance+amt};
    return a;
  });
  // Create outgoing tx for from-account owner
  const txOut={id:gid(),userId:fromOwner,accountId:fromId,type:'tr',amount:amt,note:note||(isRTL()?'تحويل متقدم خارجي':'Adv. Transfer Out'),date:tod(),createdAt:new Date().toISOString(),toAccountId:toId};
  // Create incoming tx for to-account owner if different user
  const txIn=fromOwner!==toOwner?{id:gid(),userId:toOwner,accountId:toId,type:'tr',amount:amt,note:note||(isRTL()?'تحويل متقدم وارد':'Adv. Transfer In'),date:tod(),createdAt:new Date().toISOString(),fromAccountId:fromId}:null;
  st.txs=[txOut,...(txIn?[txIn]:[]),...st.txs];
  await saveA();await saveTx();
  // Notify relevant parties
  if(fromOwner!==st.cur.id) addNotif(isRTL()?`خُصم ${fmt(amt)} من حسابك`:`${fmt(amt)} deducted from your account`,fromOwner);
  if(toOwner!==st.cur.id) addNotif(isRTL()?`أُضيف ${fmt(amt)} لحسابك`:`${fmt(amt)} added to your account`,toOwner);
  toast(tt.transferred);closeModal();
}

// ============================================================
// OFFLINE QUEUE — IndexedDB-backed pending writes
// ============================================================
const OQ = {
  dbName:'em_offline',storeName:'queue',
  async _db(){
    return new Promise((res,rej)=>{
      const req=indexedDB.open(this.dbName,1);
      req.onupgradeneeded=e=>{e.target.result.createObjectStore(this.storeName,{keyPath:'id',autoIncrement:true});};
      req.onsuccess=e=>res(e.target.result);
      req.onerror=rej;
    });
  },
  async push(key,value){
    const db=await this._db();
    return new Promise((res,rej)=>{
      const tx=db.transaction(this.storeName,'readwrite');
      tx.objectStore(this.storeName).add({key,value,ts:Date.now()});
      tx.oncomplete=res;tx.onerror=rej;
    });
  },
  async getAll(){
    const db=await this._db();
    return new Promise((res,rej)=>{
      const tx=db.transaction(this.storeName,'readonly');
      const req=tx.objectStore(this.storeName).getAll();
      req.onsuccess=e=>res(e.target.result);req.onerror=rej;
    });
  },
  async clear(){
    const db=await this._db();
    return new Promise((res,rej)=>{
      const tx=db.transaction(this.storeName,'readwrite');
      tx.objectStore(this.storeName).clear();
      tx.oncomplete=res;tx.onerror=rej;
    });
  }
};

// Override S.set to queue writes when offline
const _origSet = S.set.bind(S);
S.set = async function(key,value){
  if(!navigator.onLine && !S._isLocal(key)){
    await OQ.push(key,value);
    return;
  }
  return _origSet(key,value);
};

async function flushOfflineQueue(){
  const items = await OQ.getAll();
  if(!items.length) return;
  // merge items per key (last write wins)
  const map = {};
  items.forEach(i=>{ map[i.key]=i.value; });
  for(const [key,value] of Object.entries(map)){
    try { await _origSet(key,value); } catch(e){}
  }
  await OQ.clear();
  toast(isRTL()?'تمت المزامنة ✓':'Synced ✓','success');
}

function setupNetworkListeners(){
  const bar = document.getElementById('offlineBar');
  const updateBar=()=>{
    if(bar) bar.classList.toggle('show', !navigator.onLine);
    if(bar) bar.textContent = isRTL()
      ? '⚡ أنت غير متصل — سيتم المزامنة تلقائياً عند الاتصال'
      : '⚡ Offline — will sync automatically when connected';
  };
  window.addEventListener('online', async ()=>{ updateBar(); await flushOfflineQueue(); });
  window.addEventListener('offline', updateBar);
  updateBar();
}

function myConversations(){
  if(!st.cur) return [];
  const uid=st.cur.id;
  const peers = new Set();
  (st.msgs||[]).forEach(m=>{
    if(m.from===uid) peers.add(m.to);
    if(m.to===uid) peers.add(m.from);
  });
  // admins can msg sub users; sub users can msg their admin
  if(isAdmin()){
    subUsers().forEach(u=>peers.add(u.id));
  } else {
    const admin = st.users.find(u=>u.id===st.cur.adminId);
    if(admin) peers.add(admin.id);
  }
  return [...peers].map(pid=>{
    const user=st.users.find(u=>u.id===pid);
    const thread=(st.msgs||[]).filter(m=>(m.from===uid&&m.to===pid)||(m.from===pid&&m.to===uid));
    const unread=thread.filter(m=>m.to===uid&&!m.read).length;
    const last=thread.sort((a,b)=>b.ts-a.ts)[0];
    return{user,thread,unread,last};
  }).filter(c=>c.user).sort((a,b)=>(b.last?.ts||0)-(a.last?.ts||0));
}

  if(!body.trim()) return;

  st.msgs=[...st.msgs, msg];
  await saveMsgs();
  render();
}

    return m;
  });
  if(changed) await saveMsgs();
}

async function setBudget(catId, val){

  if(!st.budgets)st.budgets={};

  await saveBudgets();
  checkBudgetAlerts();
}

async function sendAIMsg(text){
  const isAr=isRTL();
  text=(text||'').trim();
  if(!text||st._aiLoading)return;
  const input=document.getElementById('aiInput');
  if(input)input.value='';
  if(!st._aiMsgs)st._aiMsgs=[];
  st._aiMsgs.push({role:'user',content:text});
  st._aiLoading=true;
  render();
  // مرر للأسفل
  setTimeout(()=>{const c=document.getElementById('aiChat');if(c)c.scrollTop=c.scrollHeight;},50);

  // بناء بيانات المستخدم للسياق
  const uid=st.cur.id;
  const now=new Date();
  const txs=userTx(uid,false);
  const accs=userAccs(uid);
  const thisMonth=txs.filter(tx=>{const d=new Date(tx.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const monthExp=thisMonth.filter(t=>t.type==='exp').reduce((s,t)=>s+t.amount,0);
  const monthInc=thisMonth.filter(t=>t.type==='inc').reduce((s,t)=>s+t.amount,0);
  const totalBal=accs.reduce((s,a)=>s+a.balance,0);
  const catBreakdown=st.cats.map(c=>{
    const spent=thisMonth.filter(t=>t.type==='exp'&&t.categoryId===c.id).reduce((s,t)=>s+t.amount,0);
    return spent>0?`${isAr?c.ar:c.en}: ${fmt(spent)}`:'';
  }).filter(Boolean).join(', ');
  const last3months=[-2,-1,0].map(i=>{
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const m=txs.filter(tx=>{const td=new Date(tx.date);return td.getMonth()===d.getMonth()&&td.getFullYear()===d.getFullYear();});
    return `${d.toLocaleDateString(isAr?'ar':'en',{month:'short'})}: دخل ${fmt(m.filter(t=>t.type==='inc').reduce((s,t)=>s+t.amount,0))} مصاريف ${fmt(m.filter(t=>t.type==='exp').reduce((s,t)=>s+t.amount,0))}`;
  }).join(' | ');

  const systemPrompt=`أنت مساعد مالي ذكي ومفيد اسمك "محفظة AI". تتحدث ${isAr?'بالعربية':'بالإنجليزية'} بشكل ودي ومختصر.
بيانات المستخدم الحالية:
- الرصيد الإجمالي: ${fmt(totalBal)}
- مصاريف هذا الشهر: ${fmt(monthExp)}
- دخل هذا الشهر: ${fmt(monthInc)}  
- صافي الشهر: ${fmt(monthInc-monthExp)}
- توزيع المصاريف: ${catBreakdown||'لا توجد معاملات'}
- آخر 3 أشهر: ${last3months}
- هدف التوفير: ${st.savingsTarget||20}%
- عدد الحسابات: ${accs.length}
- عدد المعاملات الكلية: ${txs.length}
أجب بشكل مفيد ومحدد بناءً على هذه البيانات. استخدم إيموجي عند المناسبة. لا تتجاوز 200 كلمة.`;

  try{
    const history=st._aiMsgs.slice(-8).map(m=>({role:m.role,content:m.content}));
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        system:systemPrompt,
        messages:history
      })
    });
    const data=await resp.json();
    const reply=data.content?.[0]?.text||( isAr?'عذراً، حدث خطأ. حاول مجدداً.':'Sorry, an error occurred.');
    st._aiMsgs.push({role:'assistant',content:reply});
  }catch(e){
    st._aiMsgs.push({role:'assistant',content:isAr?'⚠️ تعذر الاتصال. تحقق من الإنترنت.':'⚠️ Connection failed. Check internet.'});
  }
  st._aiLoading=false;
  render();
  setTimeout(()=>{const c=document.getElementById('aiChat');if(c)c.scrollTop=c.scrollHeight;},50);
}

// ============================================================
// OFFLINE-FIRST: كل البيانات تُحفظ في localStorage أولاً
// وتُزامن مع Firebase عند توفر الإنترنت
// ============================================================

// نعيد تعريف S بالكامل بنهج offline-first صحيح
const LOCAL_CACHE_KEYS = ['em_users','em_accs','em_txs','em_cats','em_notifs','em_msgs'];

// نحفظ كل البيانات في localStorage دائماً كنسخة احتياطية
const LC = {
  get(key){ try{ const r=localStorage.getItem('lc_'+key); return r?JSON.parse(r):null; }catch(e){return null;} },
  set(key,val){ try{ localStorage.setItem('lc_'+key, JSON.stringify(val)); }catch(e){} },
  clear(){ LOCAL_CACHE_KEYS.forEach(k=>localStorage.removeItem('lc_'+k)); }
};

// قائمة انتظار للعمليات أثناء الأوفلاين
const PENDING_KEY = 'em_pending_ops';
const Pending = {
  get(){ try{ const r=localStorage.getItem(PENDING_KEY); return r?JSON.parse(r):[]; }catch(e){return[];} },
  add(key,val){ const ops=this.get(); ops.push({key,val,ts:Date.now()}); localStorage.setItem(PENDING_KEY,JSON.stringify(ops)); },
  clear(){ localStorage.removeItem(PENDING_KEY); }
};

// override S كاملاً
S.get = async function(key){
  if(this._isLocal(key)){
    try{ const r=localStorage.getItem(key); return r?JSON.parse(r):null; }catch(e){return null;}
  }
  // دائماً: اقرأ من الكاش المحلي أولاً (فوري، بدون إنترنت)
  const local = LC.get(key);
  // إذا الإنترنت متاح: حدّث من Firebase في الخلفية
  if(navigator.onLine){
    fetch(`${FIREBASE_URL}/${key}.json`,{signal:AbortSignal.timeout(8000)})
      .then(r=>r.ok?r.json():null)
      .then(data=>{ if(data!==null) LC.set(key,data); })
      .catch(()=>{});
  }
  return local;
};

S.set = async function(key,value){
  if(this._isLocal(key)){
    try{ localStorage.setItem(key,JSON.stringify(value)); }catch(e){}
    return;
  }
  // احفظ دائماً محلياً أولاً (فوري)
  LC.set(key, value);
  // ثم حاول Firebase
  if(navigator.onLine){
    try{
      await fetch(`${FIREBASE_URL}/${key}.json`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(value),
        signal:AbortSignal.timeout(8000)
      });
      return;
    }catch(e){}
  }
  // إذا فشل أو أوفلاين: أضف للقائمة المعلقة
  Pending.add(key, value);
};

// مزامنة العمليات المعلقة عند عودة الإنترنت
async function syncPending(){
  const ops = Pending.get();
  if(!ops.length) return;
  // ادمج: آخر قيمة لكل مفتاح
  const latest = {};
  ops.forEach(op => { latest[op.key] = op.val; });
  let ok = true;
  for(const [key,val] of Object.entries(latest)){
    try{
      await fetch(`${FIREBASE_URL}/${key}.json`,{
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(val)
      });
    }catch(e){ ok=false; }
  }
  if(ok){
    Pending.clear();
    toast(isRTL()?'✓ تمت المزامنة مع الخادم':'✓ Synced with server','success');
  }
}

function setupNetworkListeners(){
  const bar = document.getElementById('offlineBar');
  const update = () => {
    if(bar){
      bar.classList.toggle('show', !navigator.onLine);
      bar.textContent = isRTL()
        ? '⚡ وضع أوفلاين — البيانات محفوظة محلياً وستتزامن عند الاتصال'
        : '⚡ Offline mode — data saved locally, will sync when connected';
    }
  };
  window.addEventListener('online', async ()=>{
    update();
    await syncPending();
  });
  window.addEventListener('offline', update);
  update();
}

// AUTO SYNC — تحديث تلقائي من Firebase كل 30 ثانية
// ============================================================
let _syncInterval = null;
let _lastSyncHash = '';

function startAutoSync(){
  if(_syncInterval) clearInterval(_syncInterval);
  _syncInterval = setInterval(async()=>{
    if(!navigator.onLine || !st.cur) return;
    const dot=document.getElementById('syncDot');
    try{
      const [u,a,tx,notifs,msgs] = await Promise.all([
        fetch(`${FIREBASE_URL}/em_users.json`,{signal:AbortSignal.timeout(5000)}).then(r=>r.json()),
        fetch(`${FIREBASE_URL}/em_accs.json`,{signal:AbortSignal.timeout(5000)}).then(r=>r.json()),
        fetch(`${FIREBASE_URL}/em_txs.json`,{signal:AbortSignal.timeout(5000)}).then(r=>r.json()),
        fetch(`${FIREBASE_URL}/em_notifs.json`,{signal:AbortSignal.timeout(5000)}).then(r=>r.json()),
        fetch(`${FIREBASE_URL}/em_msgs.json`,{signal:AbortSignal.timeout(5000)}).then(r=>r.json()),
      ]);
      const hash = JSON.stringify([u,a,tx,notifs,msgs]);
      if(hash === _lastSyncHash) return;
      _lastSyncHash = hash;
      if(u){st.users=u; LC.set('em_users',u);}
      if(a){st.accounts=a; LC.set('em_accs',a);}
      if(tx){st.txs=tx; LC.set('em_txs',tx);}
      if(notifs){st.notifs=notifs; LC.set('em_notifs',notifs);}
      if(msgs){st.msgs=msgs; LC.set('em_msgs',msgs);}
      if(dot){dot.classList.add('syncing');setTimeout(()=>dot.classList.remove('syncing'),800);}
      render();
    }catch(e){ /* صامت في حالة الخطأ */ }
  }, 30000);
}

// ===== AUTO BACKUP SYSTEM =====
// ============================================================
const BACKUP_KEY = 'mywallet_backups';
const BACKUP_INTERVAL_MS = 24 * 60 * 60 * 1000; // 24 hours
const MAX_BACKUPS = 7; // keep last 7 days

function getBackups(){
  try{ return JSON.parse(localStorage.getItem(BACKUP_KEY)||'[]'); }catch(e){ return []; }
}

function saveBackupToStorage(backups){
  try{ localStorage.setItem(BACKUP_KEY, JSON.stringify(backups)); }catch(e){}
}

function createBackup(isManual=false){
  try{
    const backups = getBackups();
    const now = new Date();
    const snapshot = {
      id: 'bk_'+Date.now(),
      date: now.toISOString(),
      label: isManual ? (isRTL()?'نسخة يدوية':'Manual Backup') : (isRTL()?'نسخة تلقائية':'Auto Backup'),
      manual: isManual,
      data: {
        accounts: JSON.parse(JSON.stringify(st.accounts||[])),
        txs: JSON.parse(JSON.stringify(st.txs||[])),
        cats: JSON.parse(JSON.stringify(st.cats||[])),
        goals: JSON.parse(JSON.stringify(st.goals||[])),
        budgets: JSON.parse(JSON.stringify(st.budgets||{})),
        currency: st.currency,
        lang: st.lang,
        dec: st.dec
      }
    };
    // Keep manual backups separate, auto-backups limited to MAX_BACKUPS
    const autoBackups = backups.filter(b=>!b.manual).slice(0, MAX_BACKUPS-1);
    const manualBackups = backups.filter(b=>b.manual).slice(0, 4);
    const newList = isManual 
      ? [snapshot, ...manualBackups, ...autoBackups]
      : [...manualBackups, snapshot, ...autoBackups];
    saveBackupToStorage(newList);
    localStorage.setItem('mywallet_last_backup', Date.now().toString());
    if(isManual) toast(isRTL()?'✅ تم إنشاء النسخة الاحتياطية':'✅ Backup created successfully','success');
    return snapshot;
  }catch(e){ console.error('Backup failed',e); return null; }
}

function checkAndAutoBackup(){
  const last = parseInt(localStorage.getItem('mywallet_last_backup')||'0');
  const now = Date.now();
  if(now - last >= BACKUP_INTERVAL_MS){
    // Only backup if user is logged in and has data
    if(st.cur && (st.accounts.length>0||st.txs.length>0)){
      createBackup(false);
    }
  }
}

function restoreBackup(backupId){
  try{
    const backups = getBackups();
    const bk = backups.find(b=>b.id===backupId);
    if(!bk){toast(isRTL()?'النسخة غير موجودة':'Backup not found','error');return;}
    const isAr = isRTL();
    const msg = isAr
      ? `⚠️ استعادة النسخة من ${new Date(bk.date).toLocaleDateString('ar')}؟\nستُستبدل جميع البيانات الحالية.`
      : `⚠️ Restore backup from ${new Date(bk.date).toLocaleDateString('en')}?\nAll current data will be replaced.`;
    st.confirm = {
      msg,
      fn: async ()=>{
        if(bk.data.accounts) st.accounts = bk.data.accounts;
        if(bk.data.txs) st.txs = bk.data.txs;
        if(bk.data.cats) st.cats = bk.data.cats;
        if(bk.data.goals) st.goals = bk.data.goals;
        if(bk.data.budgets) st.budgets = bk.data.budgets;
        if(bk.data.currency) st.currency = bk.data.currency;
        await saveA(); await saveTx(); await saveCats();
        await saveSets();
        toast(isAr?'✅ تمت الاستعادة بنجاح':'✅ Restore successful','success');
        closeModal(); render();
      }
    };
    render();
  }catch(e){ toast(isRTL()?'خطأ في الاستعادة':'Restore error','error'); }
}

function deleteBackup(backupId){
  const backups = getBackups().filter(b=>b.id!==backupId);
  saveBackupToStorage(backups);
  render();
}

function exportBackupFile(){
  try{
    const allData = {
      exportDate: new Date().toISOString(),
      app: 'محفظتي',
      version: '3.0',
      accounts: st.accounts,
      txs: st.txs,
      cats: st.cats,
      goals: st.goals,
      budgets: st.budgets,
      settings: {currency:st.currency, lang:st.lang, dec:st.dec}
    };
    const blob = new Blob([JSON.stringify(allData,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`mywallet-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
    toast(isRTL()?'📥 تم تصدير الملف':'📥 File exported','success');
  }catch(e){}
}

function importBackupFile(){
  const input = document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange = async (e)=>{
    const file = e.target.files[0]; if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!data.accounts && !data.txs){toast(isRTL()?'ملف غير صالح':'Invalid file','error');return;}
      st.confirm = {
        msg: isRTL()?'⚠️ استيراد ملف الاحتياطي؟ ستُستبدل جميع البيانات.':'⚠️ Import backup file? All data will be replaced.',
        fn: async ()=>{
          if(data.accounts) st.accounts=data.accounts;
          if(data.txs) st.txs=data.txs;
          if(data.cats) st.cats=data.cats;
          if(data.goals) st.goals=data.goals||[];
          if(data.budgets) st.budgets=data.budgets||{};
          if(data.settings){st.currency=data.settings.currency||st.currency;st.lang=data.settings.lang||st.lang;}
          await saveA(); await saveTx(); await saveCats(); await saveSets();
          toast(isRTL()?'✅ تم الاستيراد بنجاح':'✅ Import successful','success');
          closeModal(); render();
        }
      };
      render();
    }catch(err){ toast(isRTL()?'خطأ في قراءة الملف':'File read error','error'); }
  };
  input.click();
}

async function installPWA(){

// ============================================================
// AI CLASSIFICATION — تصنيف ذكي بالذكاء الاصطناعي
// ============================================================
async function aiClassify(note, amount){
  if(!note||note.length<2) return null;
  try{
    const catList = st.cats.map(c=>`${c.id}:${c.ar}/${c.en}`).join(', ');
    const prompt = `You are a financial transaction classifier. Given a transaction note and amount, pick the BEST matching category ID from this list: ${catList}. Transaction: "${note}", Amount: ${amount}. Respond with ONLY the category ID (e.g. c1), nothing else.`;
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:20,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await resp.json();
    const catId = data.content?.[0]?.text?.trim();
    if(catId && st.cats.find(c=>c.id===catId)) return catId;
  }catch(e){}
  return null;
}

// ============================================================
// BUDGET ALERTS — تنبيهات الميزانية
// ============================================================
function checkBudgetAlerts(){
  const isAr=isRTL();
  const now=new Date();
  const uid=st.cur?.id;
  if(!uid) return;
  // Use current user's budgets (sub users share admin's budget settings by default)
  const budgets=st.budgets||{};
  const thisMonthTxs=userTx(uid).filter(tx=>{
    const d=new Date(tx.date);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&tx.type==='exp';
  });
  Object.entries(st.budgets||{}).forEach(([catId,limit])=>{
    if(!limit||limit<=0) return;
    const spent=thisMonthTxs.filter(tx=>tx.categoryId===catId).reduce((s,tx)=>s+tx.amount,0);
    const pct=spent/limit;
    const cat=st.cats.find(c=>c.id===catId);
    if(!cat) return;
    const catName=isAr?cat.ar:cat.en;
    if(pct>=1){
      const key=`budget_over_${catId}_${now.getMonth()}`;
      if(!sessionStorage.getItem(key)){
        sessionStorage.setItem(key,'1');
        toast(isAr?`⚠️ تجاوزت ميزانية ${catName}!`:`⚠️ Over budget: ${catName}!`,'error');
      }
    } else if(pct>=0.8){
      const key=`budget_warn_${catId}_${now.getMonth()}`;
      if(!sessionStorage.getItem(key)){
        sessionStorage.setItem(key,'1');
        toast(isAr?`🔔 اقتربت من ميزانية ${catName} (${Math.round(pct*100)}%)`:`🔔 ${catName} budget at ${Math.round(pct*100)}%`,'warning');
      }
    }
  });
}

// ============================================================
// CSV IMPORT — استيراد CSV
// ============================================================
function importCSV(file){
  const isAr=isRTL();
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    if(lines.length<2){toast(isAr?'الملف فارغ':'File is empty','error');return;}
    let imported=0;
    const uid=st.cur.id;
    const vacc=visAccs(uid);
    if(!vacc.length){toast(isAr?'أضف حساباً أولاً':'Add an account first','error');return;}
    const defAcc=vacc[0];
    // skip header
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      if(cols.length<3) continue;
      const [date,amtStr,typeRaw,...rest]=cols;
      const amt=parseFloat(amtStr);
      if(isNaN(amt)||amt<=0) continue;
      const typeMap={'مصروف':'exp','مصاريف':'exp','expense':'exp','exp':'exp','دخل':'inc','income':'inc','inc':'inc','تحويل':'tr','transfer':'tr','tr':'tr'};
      const type=typeMap[(typeRaw||'').toLowerCase()]||'exp';
      const note=rest[0]||'';
      const tx={id:gid(),userId:uid,accountId:defAcc.id,type,amount:amt,categoryId:'',note,date:date||tod(),createdAt:new Date().toISOString()};
      st.txs=[tx,...st.txs];
      if(type==='exp') st.accounts=st.accounts.map(a=>a.id===defAcc.id?{...a,balance:a.balance-amt}:a);
      else if(type==='inc') st.accounts=st.accounts.map(a=>a.id===defAcc.id?{...a,balance:a.balance+amt}:a);
      imported++;
    }
    if(imported>0){
      await saveA();await saveTx();
      toast(isAr?`تم استيراد ${imported} معاملة ✓`:`Imported ${imported} transactions ✓`);
      render();
    } else {
      toast(isAr?'لم يتم استيراد أي معاملة':'No transactions imported','error');
    }
  };
  reader.readAsText(file);
}

async function setCurrency(code){
  const isAr=isRTL();
  const oldCode=st.currency||'USD';
  if(oldCode===code){return;}

  // جلب سعر الصرف من API مجاني
  async function getRate(from,to){
    try{
      const r=await fetch(`https://open.er-api.com/v6/latest/${from}`,{signal:AbortSignal.timeout(6000)});
      const d=await r.json();
      return d?.rates?.[to]||null;
    }catch(e){return null;}
  }

  const hasBalances=st.accounts.some(a=>a.userId===st.cur?.id&&a.balance>0);
  if(!hasBalances){
    // لا توجد أرصدة — غيّر مباشرة
    st.currency=code;await saveSets();render();return;
  }

  // اعرض نافذة تأكيد مع سعر الصرف
  const loadingMsg=isAr?'⏳ جاري جلب سعر الصرف...':'⏳ Fetching exchange rate...';
  toast(loadingMsg);
  const rate=await getRate(oldCode,code);
  const oldCur=CURRENCIES[oldCode]||CURRENCIES.USD;
  const newCur=CURRENCIES[code]||CURRENCIES.USD;

  if(rate){
    const rateDisplay=`1 ${oldCur.symbol} = ${rate.toFixed(4)} ${newCur.symbol}`;
    st.confirm={
      icon:'💱',
      title:isAr?'تحويل العملة':'Convert Currency',
      msg:isAr
        ?`${rateDisplay}\n\nهل تريد تحويل جميع الأرصدة من ${oldCur.nameAr} إلى ${newCur.nameAr}؟`
        :`${rateDisplay}\n\nConvert all balances from ${oldCur.name} to ${newCur.name}?`,
      okLabel:isAr?'نعم، حوّل الأرصدة':'Yes, Convert',
      danger:false,
      fn:async()=>{
        // حوّل جميع الأرصدة
        st.accounts=st.accounts.map(a=>({...a,balance:parseFloat((a.balance*rate).toFixed(st.dec))}));
        // حوّل المعاملات
        st.txs=st.txs.map(tx=>({...tx,amount:parseFloat((tx.amount*rate).toFixed(st.dec))}));
        // حوّل الميزانيات
        const newBudgets={};
        Object.entries(st.budgets||{}).forEach(([k,v])=>{newBudgets[k]=parseFloat((v*rate).toFixed(st.dec));});
        st.budgets=newBudgets;
        // حوّل الأهداف
        st.goals=(st.goals||[]).map(g=>({...g,target:parseFloat((g.target*rate).toFixed(st.dec)),current:parseFloat((g.current*rate).toFixed(st.dec))}));
        st.currency=code;
        await Promise.all([saveA(),saveTx(),saveBudgets(),saveGoals(),saveSets()]);
        toast(isAr?`✅ تم التحويل إلى ${newCur.nameAr} (${rateDisplay})`:`✅ Converted to ${newCur.name} (${rateDisplay})`);
        render();
      },
      cancelFn:async()=>{
        // غيّر الرمز فقط بدون تحويل
        st.currency=code;await saveSets();render();
      }
    };
    render();
  } else {
    // فشل جلب السعر — غيّر الرمز فقط
    st.currency=code;await saveSets();
    toast(isAr?`⚠️ تعذّر جلب سعر الصرف — تم تغيير الرمز فقط`:`⚠️ Could not fetch rate — symbol changed only`,'warning');
    render();
  }
}
